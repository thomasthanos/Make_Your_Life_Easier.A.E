name: Supabase Keep-Alive

# Supabase pauses free projects that get "too few user queries over the past
# week" — per their docs, "a few user requests to the database each day" is
# the bar. One ping every few days is NOT enough (learned the hard way), so
# this runs twice a day and issues several queries per run.
on:
  schedule:
    - cron: '0 3,15 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Supabase database activity
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY secrets are missing"
            exit 1
          fi

          now=$(TZ='Europe/Athens' date +%Y-%m-%dT%H:%M:%S)
          ok=0

          # 1) Write query (the one that must succeed), with retries for
          #    transient failures like a stale PostgREST schema cache.
          for attempt in 1 2 3; do
            resp=$(curl -s --max-time 30 -w $'\n%{http_code}' -X PATCH \
              "$SUPABASE_URL/rest/v1/keepalive?id=eq.1" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=representation" \
              --data "{\"pinged_at\":\"$now\"}")
            code=$(printf '%s' "$resp" | tail -n1)
            body=$(printf '%s' "$resp" | sed '$d')
            echo "PATCH keepalive attempt $attempt: HTTP $code"
            echo "$body"
            if [ "$code" = "200" ] && printf '%s' "$body" | grep -q pinged_at; then
              ok=1
              break
            fi
            sleep 30
          done

          # 2) Extra read queries — best-effort additional database activity
          #    so the daily query count stays above the pause threshold.
          for path in \
            "keepalive?select=id,pinged_at&limit=1" \
            "user_settings?select=user_id&limit=1"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "$SUPABASE_URL/rest/v1/$path" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")
            echo "GET /$path -> HTTP $code"
          done

          # 3) Auth health check — activity on a second service surface.
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "$SUPABASE_URL/auth/v1/health" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY")
          echo "GET /auth/v1/health -> HTTP $code"

          if [ "$ok" != "1" ]; then
            echo "::error::Keep-alive write failed after 3 attempts"
            exit 1
          fi
          echo "Keep-alive OK"
