name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install
        npm run postinstall

    - name: Import signing certificate
      shell: pwsh
      env:
        CERT_B64: ${{ secrets.WIN_CSC_LINK }}
        CERT_PASS: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      run: |
        $pfx = "$PWD/config/signing/certificate.pfx"
        New-Item -ItemType Directory -Force config/signing | Out-Null
        [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_B64))
        $pass = ConvertTo-SecureString $env:CERT_PASS -AsPlainText -Force
        Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pass | Out-Null

    - name: Compile updater
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force src/resources/updater | Out-Null
        & "$env:SystemRoot\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /nologo /target:winexe /optimize+ /out:src\resources\updater\Updater.exe /r:System.IO.Compression.FileSystem.dll /r:System.IO.Compression.dll /win32icon:src\assets\icons\hacker.ico tools\updater\Updater.cs
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Build application
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: npm run build-app

    - name: Publish update feed to R2
      shell: pwsh
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: auto
        AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
        AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_BUCKET: ${{ secrets.R2_BUCKET }}
      run: |
        $endpoint = "https://$env:R2_ACCOUNT_ID.r2.cloudflarestorage.com"
        aws s3 cp artifacts/dist/latest.yml "s3://$env:R2_BUCKET/latest.yml" --endpoint-url $endpoint --content-type "text/yaml" --cache-control "no-cache"
        aws s3 cp artifacts/dist/MakeYourLifeEasier-installer.exe "s3://$env:R2_BUCKET/MakeYourLifeEasier-installer.exe" --endpoint-url $endpoint
        aws s3 cp artifacts/dist/MakeYourLifeEasier-installer.exe.blockmap "s3://$env:R2_BUCKET/MakeYourLifeEasier-installer.exe.blockmap" --endpoint-url $endpoint
        $zip = Get-ChildItem artifacts/dist/*-win.zip | Select-Object -First 1
        aws s3 cp $zip.FullName "s3://$env:R2_BUCKET/$($zip.Name)" --endpoint-url $endpoint

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          artifacts/dist/*.exe
          artifacts/dist/*.blockmap
          artifacts/dist/*.zip
          artifacts/dist/latest.yml
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
