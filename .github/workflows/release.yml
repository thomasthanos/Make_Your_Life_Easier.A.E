name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install
        npm run postinstall

    - name: Restore signing certificate
      shell: pwsh
      env:
        CERT_B64: ${{ secrets.WIN_CSC_LINK }}
      run: |
        New-Item -ItemType Directory -Force config/signing | Out-Null
        [IO.File]::WriteAllBytes("$PWD/config/signing/certificate.pfx", [Convert]::FromBase64String($env:CERT_B64))

    - name: Build application
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: npm run build-all

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          artifacts/dist/*.exe
          artifacts/dist/*.blockmap
          artifacts/dist/latest.yml
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
