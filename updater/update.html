<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; object-src 'none'; base-uri 'self';" />
    <title>Make Your Life Easier - Loading</title>
    
    <!-- DNS Prefetch & Preconnect (static - added dynamically would be too late) -->
    <link rel="dns-prefetch" href="https://www.google.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://i.postimg.cc">
    <link rel="preconnect" href="https://www.google.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://i.postimg.cc" crossorigin>
    
    <!-- Preload local critical assets -->
    <link rel="preload" href="../src/assets/icons/hacker.ico" as="image" type="image/x-icon">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../src/assets/icons/hacker.ico" />
    <link rel="stylesheet" href="../src/styles/tokens.css" />
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: transparent;
        color: var(--text-primary);
        font-family: sans-serif;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      .update-card {
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.05) 60%),
          var(--panel-strong);
        border-radius: 16px;
        padding: 40px;
        width: 380px;
        display: flex;
        flex-direction: column;
        align-items: center;
        border: 1px solid var(--gloss-border-top);
        box-shadow: var(--gloss-inner);
        backdrop-filter: blur(20px) saturate(1.6);
        -webkit-backdrop-filter: blur(20px) saturate(1.6);
      }
      .icon {
        width: 74px;
        height: 74px;
        margin-bottom: 20px;
        filter: brightness(0.9);
        border-radius: 16px;
      }
      .title {
        margin: 0;
        margin-bottom: 12px;
        font-size: 24px;
        font-weight: 600;
        color: var(--text-primary);
      }
      .status {
        margin: 0;
        margin-bottom: 24px;
        font-size: 15px;
        color: var(--text-secondary);
        text-align: center;
      }
      .progress-wrapper {
        width: 100%;
      }
      .progress-bar-bg {
        width: 100%;
        height: 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.4);
      }
      .progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--accent) 0%, var(--accent-dk) 50%, var(--accent) 100%);
        background-size: 200% 100%;
        border-radius: 4px;
        box-shadow: 0 0 8px var(--accent-glow);
        transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        animation: shimmer 2s infinite linear;
      }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body>
    <div class="update-card">
      <img class="icon" src="../src/assets/icons/hacker.ico" alt="App logo">
      <h1 class="title">Make Your Life Easier</h1>
      <p id="status" class="status">Checking for updates…</p>
      <div class="progress-wrapper">
        <div class="progress-bar-bg">
          <div class="progress-bar"></div>
        </div>
      </div>
    </div>
    
    <!-- Load favicon config and preloader -->
    <script src="../src/config/favicon-config.js"></script>
    <script src="updateRenderer.js"></script>
    <script src="preloader.js"></script>
  </body>
</html>
